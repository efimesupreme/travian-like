<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аурелия-18</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="top-panel">
      <div>
        <p class="label">Технический прототип</p>
        <h1>Аурелия-18</h1>
        <p class="description">Базовый экран состояния колонии без боёвки, карты, города и сложных квестов.</p>
      </div>
      <button id="newGameButton" class="secondary-button">Новая игра</button>
    </header>

    <section class="panel">
      <h2>Действия</h2>
      <div class="actions">
        <button id="collectMetalButton">Собрать металл</button>
        <button id="collectWaterButton">Добыть воду</button>
        <button id="repairHullButton">Отремонтировать корпус</button>
      </div>
      <p class="hint">Ремонт корпуса стоит 5 металла и восстанавливает 10 единиц корпуса.</p>
    </section>

    <section class="state-grid">
      <article class="panel">
        <h2>Герой</h2>
        <div id="heroState" class="stat-list"></div>
      </article>

      <article class="panel">
        <h2>Корабль</h2>
        <div id="shipState" class="stat-list"></div>
      </article>

      <article class="panel">
        <h2>Ресурсы</h2>
        <div id="resourcesState" class="stat-list"></div>
      </article>

      <article class="panel">
        <h2>Дроны</h2>
        <div id="dronesState" class="stat-list"></div>
      </article>

      <article class="panel">
        <h2>Производственные участки</h2>
        <div id="sitesState" class="stat-list"></div>
      </article>

      <article class="panel">
        <h2>Активные задачи</h2>
        <ul id="tasksState" class="task-list"></ul>
      </article>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
